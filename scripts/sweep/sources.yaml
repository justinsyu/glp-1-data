defaults:
  user_agent: "GLP1DataArchiveSweep/1.0 (+https://justinsyu.github.io/glp-1-data)"
  timeout_seconds: 45
  download_timeout_seconds: 180
  retry_attempts: 3
  retry_backoff_seconds: [2, 5, 15]
  playwright_headless: true
  pubmed_tool_name: "glp1-data-archive-sweep"
  pubmed_email: ""
  pubmed_api_key: ""

companies:
  - id: eli_lilly
    name: Eli Lilly and Company
    folder: companies/eli_lilly
    tier: 3
    sources:
      - kind: html
        url: https://medical.lilly.com/de/science/
        fetcher: requests
        link_pattern: "\\.pdf(\\?|$)|/assets/vaultpdf/|/congress/"
        title_filter: "orforglipron|Foundayo|tirzepatide|Zepbound|Mounjaro|retatrutide|Trulicity|dulaglutide|GLP-1|GIP|glucagon|obesity|diabetes"
        discovery_only: true
        dest_worklist: companies/eli_lilly/_worklist_pending_medical.md
      - kind: html
        url: https://lilly.gcs-web.com/news-releases
        fetcher: requests
        link_pattern: "/node/[0-9]+/pdf|\\.pdf(\\?|$)"
        title_filter: "orforglipron|Foundayo|tirzepatide|Zepbound|Mounjaro|retatrutide|Trulicity|dulaglutide|GLP-1|GIP|glucagon|obesity|diabetes"
        dest: companies/eli_lilly/retatrutide/presentations_posters
        dest_router:
          - pattern: "orforglipron|Foundayo"
            dest: companies/eli_lilly/orforglipron/presentations_posters
          - pattern: "tirzepatide|Zepbound|Mounjaro"
            dest: companies/eli_lilly/tirzepatide/presentations_posters
          - pattern: "dulaglutide|Trulicity"
            dest: companies/eli_lilly/dulaglutide/published_manuscripts

